<div class="flex h-screen overflow-hidden bg-surface-50">
  <aside
    class="bg-surface-0 border-r border-surface-200 shrink-0 transition-all duration-200 flex flex-col"
    [class.w-64]="!isCollapsed()"
    [class.w-16]="isCollapsed()"
  >
    <div class="h-16 flex items-center gap-2 px-4 border-b border-surface-200 shrink-0">
      <div class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center shrink-0">
        <i class="pi pi-align-left text-white text-base"></i>
      </div>
      <span *ngIf="!isCollapsed()" class="text-xl font-bold whitespace-nowrap">DT CMS</span>
    </div>

    <app-sidebar class="flex-1 min-h-0 overflow-y-auto" [collapsed]="isCollapsed()"></app-sidebar>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <app-header (toggleSidenav)="toggleSidenav()"></app-header>

    <main class="flex-1 overflow-y-auto p-4 md:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
