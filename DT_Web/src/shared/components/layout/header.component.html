<div class="flex items-center justify-between px-4 h-16 bg-surface-0 border-b border-surface-200 shrink-0">
  <button
    pButton
    type="button"
    icon="pi pi-bars"
    class="p-button-text p-button-rounded"
    (click)="toggleSidenav.emit()"
  ></button>

  <div class="flex items-center gap-2">
    <button
      pButton
      type="button"
      icon="pi pi-palette"
      class="p-button-text p-button-rounded"
      pTooltip="Tùy chỉnh giao diện"
      tooltipPosition="bottom"
      (click)="themeService.openPanel()"
    ></button>
    <button
      pButton
      type="button"
      [label]="authService.currentUser()?.fullName ?? 'User'"
      icon="pi pi-user"
      class="p-button-text"
      (click)="userMenu.toggle($event)"
    ></button>
    <p-menu #userMenu [popup]="true" [model]="userMenuItems"></p-menu>
  </div>
</div>
